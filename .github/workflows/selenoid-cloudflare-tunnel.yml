name: Selenoid with UI and Cloudflare Tunnel

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: 'How many minutes to keep the tunnel alive (max 360)?'
        required: false
        default: '60'

jobs:
  selenoid-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # 1. Create browsers.json with a known good image
      - name: Setup Selenoid config
        run: |
          mkdir -p /tmp/selenoid
          cat > /tmp/selenoid/browsers.json <<'EOF'
          {
            "chrome": {
              "default": "100.0",
              "versions": {
                "100.0": {
                  "image": "selenoid/vnc:chrome_100.0",
                  "port": "4444",
                  "path": "/"
                }
              }
            }
          }
          EOF

      # 2. Pre‑pull the browser image to avoid "no such image"
      - name: Pull Chrome browser image
        run: docker pull selenoid/vnc:chrome_100.0

      # 3. Start Selenoid hub on port 4444
      - name: Run Selenoid
        run: |
          docker run -d --name selenoid \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /tmp/selenoid:/etc/selenoid:ro \
            -p 4444:4444 \
            aerokube/selenoid:latest-release \
            -conf /etc/selenoid/browsers.json \
            -limit 2 \
            -timeout 1m
          # Wait for Selenoid ready
          for i in {1..15}; do
            if curl -s http://localhost:4444/status | grep -q '"ready":true'; then
              echo "✅ Selenoid hub ready"
              break
            fi
            sleep 2
          done

      # 4. Start Selenoid UI on port 8080
      - name: Run Selenoid UI
        run: |
          docker run -d --name selenoid-ui \
            -p 8080:8080 \
            --link selenoid \
            aerokube/selenoid-ui:latest-release \
            --selenoid-uri=http://selenoid:4444
          sleep 5
          curl -s http://localhost:8080/status || echo "UI starting..."

      # 5. Install Cloudflare Tunnel
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      # 6. Expose UI (port 8080) and Hub (port 4444) via separate tunnels
      - name: Start Cloudflare Tunnel for UI
        id: tunnel_ui
        run: |
          nohup cloudflared tunnel --url http://localhost:8080 --logfile cf_ui.log &
          sleep 8
          UI_URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' cf_ui.log | head -1)
          echo "ui_url=$UI_URL" >> $GITHUB_OUTPUT
          echo "SELENOID_UI_URL=$UI_URL" >> $GITHUB_ENV
          echo "✅ UI Tunnel URL: $UI_URL"

      - name: Start Cloudflare Tunnel for Hub
        id: tunnel_hub
        run: |
          nohup cloudflared tunnel --url http://localhost:4444 --logfile cf_hub.log &
          sleep 8
          HUB_URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' cf_hub.log | head -1)
          echo "hub_url=$HUB_URL" >> $GITHUB_OUTPUT
          echo "SELENOID_HUB_URL=$HUB_URL" >> $GITHUB_ENV
          echo "✅ Hub Tunnel URL: $HUB_URL"

      # 7. Display URLs in job summary
      - name: Display URLs
        run: |
          echo "## 🎛️ Selenoid UI is ready!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**UI URL:** ${{ steps.tunnel_ui.outputs.ui_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Selenium Hub URL (for scripts):** ${{ steps.tunnel_hub.outputs.hub_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⏱️ Tunnel active for ${{ github.event.inputs.duration_minutes || 60 }} minutes."
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📺 How to use the UI" >> $GITHUB_STEP_SUMMARY
          echo "1. Open the UI URL in your browser." >> $GITHUB_STEP_SUMMARY
          echo "2. You'll see running sessions, videos, and logs." >> $GITHUB_STEP_SUMMARY
          echo "3. To run a test, use the Hub URL in your Selenium script." >> $GITHUB_STEP_SUMMARY

      # 8. Keep tunnel alive
      - name: Keep tunnel alive
        run: |
          DURATION=${{ github.event.inputs.duration_minutes || 60 }}
          echo "⏳ Keeping tunnel alive for ${DURATION} minutes. Press cancel to stop."
          sleep $(( DURATION * 60 ))

      # 9. Upload logs (always)
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenoid-logs
          path: |
            cf_ui.log
            cf_hub.log
