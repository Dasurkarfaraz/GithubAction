name: Selenoid with Cloudflare Tunnel

on:
  workflow_dispatch:            # manual trigger – you can also use schedule or API
    inputs:
      duration_minutes:
        description: 'How many minutes to keep the tunnel alive (max 360)?'
        required: false
        default: '60'
        type: string

jobs:
  selenoid-tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 360        # max 6 hours for GitHub hosted runner

    steps:
      # 1. No checkout needed – but we keep for possible scripts
      - name: Checkout (optional)
        uses: actions/checkout@v4

      # 2. Create Selenoid configuration (browsers.json)
      - name: Setup Selenoid config
        run: |
          mkdir -p /tmp/selenoid
          cat > /tmp/selenoid/browsers.json <<'EOF'
          {
            "chrome": {
              "default": "latest",
              "versions": {
                "latest": {
                  "image": "selenoid/vnc:chrome_122.0",
                  "port": "4444",
                  "path": "/"
                }
              }
            }
          }
          EOF

      # 3. Start Selenoid container (binds Docker socket to spawn browsers)
      - name: Run Selenoid
        run: |
          docker run -d --name selenoid \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /tmp/selenoid:/etc/selenoid:ro \
            -p 4444:4444 \
            aerokube/selenoid:latest-release \
            -conf /etc/selenoid/browsers.json \
            -limit 2 \
            -timeout 1m
          # Wait for Selenoid to become ready
          for i in {1..15}; do
            if curl -s http://localhost:4444/status | grep -q '"ready":true'; then
              echo "✅ Selenoid is ready"
              break
            fi
            echo "Waiting for Selenoid... ($i/15)"
            sleep 2
          done

      # 4. Download and run Cloudflare Tunnel (cloudflared)
      - name: Setup Cloudflare Tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      - name: Start Cloudflare Tunnel and capture URL
        id: tunnel
        run: |
          # Run tunnel in background, output logs to file
          nohup cloudflared tunnel --url http://localhost:4444 --logfile cf_tunnel.log &
          sleep 8
          # Extract public URL from log
          PUBLIC_URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' cf_tunnel.log | head -1)
          if [ -z "$PUBLIC_URL" ]; then
            echo "❌ Failed to get tunnel URL. Log content:"
            cat cf_tunnel.log
            exit 1
          fi
          echo "public_url=$PUBLIC_URL" >> $GITHUB_OUTPUT
          echo "SELENOID_URL=$PUBLIC_URL" >> $GITHUB_ENV
          echo "🔗 Tunnel URL: $PUBLIC_URL"

      # 5. Display the URL prominently in the job summary
      - name: Show tunnel URL in summary
        run: |
          echo "## 🌐 Your remote Selenoid Hub is ready!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Public URL:** ${{ steps.tunnel.outputs.public_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### How to use it:" >> $GITHUB_STEP_SUMMARY
          echo '```python' >> $GITHUB_STEP_SUMMARY
          echo "from selenium import webdriver" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "options = webdriver.ChromeOptions()" >> $GITHUB_STEP_SUMMARY
          echo "# Optional: enable video recording" >> $GITHUB_STEP_SUMMARY
          echo "options.set_capability('selenoid:options', {'enableVideo': True})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "driver = webdriver.Remote(" >> $GITHUB_STEP_SUMMARY
          echo "    command_executor='${{ steps.tunnel.outputs.public_url }}/wd/hub'," >> $GITHUB_STEP_SUMMARY
          echo "    options=options" >> $GITHUB_STEP_SUMMARY
          echo ")" >> $GITHUB_STEP_SUMMARY
          echo "driver.get('https://example.com')" >> $GITHUB_STEP_SUMMARY
          echo "print(driver.title)" >> $GITHUB_STEP_SUMMARY
          echo "driver.quit()" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⏱️ This tunnel will stay open for **${{ github.event.inputs.duration_minutes || 60 }}** minutes, or until you cancel the workflow."

      # 6. Keep the workflow alive for the requested duration
      - name: Keep tunnel alive
        run: |
          DURATION=${{ github.event.inputs.duration_minutes || 60 }}
          echo "⏳ Keeping tunnel alive for ${DURATION} minutes..."
          # Sleep in seconds
          sleep $(( DURATION * 60 ))

      # 7. (Optional) Collect artifacts – videos, screenshots from Selenoid
      # Note: Videos are stored inside the Selenoid container by default.
      # You can add a step to copy them, but it's more complex.
      - name: Cleanup and collect logs (always)
        if: always()
        run: |
          docker logs selenoid > selenoid.log 2>&1
          echo "Selenoid logs saved."
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenoid-tunnel-logs
          path: |
            cf_tunnel.log
            selenoid.log
